<mat-toolbar class="app-toolbar">
  <button
    mat-icon-button
    (click)="onMenuToggle()"
    [attr.aria-label]="'TOOLBAR.TOGGLE_MENU' | translate">
    <mat-icon>menu</mat-icon>
  </button>

  <span class="toolbar-title">{{ 'TOOLBAR.TITLE' | translate }}</span>
  <span class="toolbar-spacer"></span>

  <span class="toolbar-date">
    {{ today | date:(isRtl ? 'dd/MM/yyyy' : 'EEE, MMM d') }}
  </span>

  <button
    mat-icon-button
    (click)="onLangToggle()"
    class="lang-btn"
    [matTooltip]="'TOOLBAR.TOGGLE_LANG' | translate">
    <span class="lang-label">{{ currentLang === 'en' ? 'ع' : 'EN' }}</span>
  </button>

  <button
    mat-icon-button
    (click)="onThemeToggle()"
    [matTooltip]="'TOOLBAR.TOGGLE_DARK' | translate">
    <mat-icon>{{ isDark ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>

  <button
    mat-icon-button
    (click)="onLogout()"
    [matTooltip]="'TOOLBAR.LOGOUT' | translate">
    <mat-icon color="warn">logout</mat-icon>
  </button>
</mat-toolbar>
